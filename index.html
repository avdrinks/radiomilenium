<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Milenium 102.3 | En Vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --magenta: #ff007f;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--dark);
            background-image: radial-gradient(circle at top right, rgba(255, 0, 127, 0.1), transparent 40%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Reloj Fijo Hora Argentina */
        .clock-container {
            margin-top: 10px;
            background: var(--glass);
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #digital-clock {
            font-family: monospace;
            font-size: 1.4rem;
            color: var(--magenta);
            letter-spacing: 2px;
            font-weight: bold;
        }
        #current-date {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .main-container { width: 100%; max-width: 420px; text-align: center; margin-top: 20px; }
        .logo-main { width: 160px; height: 160px; border-radius: 50%; margin-bottom: 25px; box-shadow: 0 0 40px rgba(255, 0, 127, 0.2); border: 2px solid var(--border); }

        /* Tarjeta de programa Dinámico */
        .live-program-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .program-logo { width: 75px; height: 75px; border-radius: 12px; background: #111; object-fit: cover; border: 1px solid var(--border); }
        .program-info h2 { font-size: 1.1rem; color: white; margin-bottom: 2px; font-weight: 600; }
        .program-info p { font-size: 0.9rem; color: rgba(255,255,255,0.6); }

        /* Contenedor del Reproductor */
        .player-box { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 25px; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            margin-bottom: 25px;
        }
        .play-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--magenta); border: none; color: white; font-size: 28px; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; }
        .play-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px var(--magenta); }

        /* Botones de enlace */
        .action-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn { text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; font-size: 0.95rem; }
        .btn-store { background: white; color: black; }
        .btn-wa { background: #25d366; color: white; }
        .btn-phone { background: rgba(255,255,255,0.08); color: white; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-2px); opacity: 0.95; }
        
        footer { margin-top: auto; padding: 20px; font-size: 0.75rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="digital-clock">00:00:00</div>
        <div id="current-date">Cargando hora de Argentina...</div>
    </div>

    <div class="main-container">
        <img src="logo.png" class="logo-main" alt="FM Milenium">

        <div class="live-program-card">
            <img src="logo.png" class="program-logo" id="prog-logo">
            <div class="program-info">
                <p style="font-size: 0.7rem; letter-spacing: 1px; color: var(--magenta); font-weight: bold; margin-bottom: 3px;">● EN VIVO DESDE ARGENTINA</p>
                <h2 id="prog-name">Conectando...</h2>
                <p id="prog-host">Cargando programación en vivo</p>
            </div>
        </div>

        <div class="player-box">
            <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
            <div style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-volume-down" style="font-size: 0.8rem; opacity: 0.5;"></i>
                <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" style="accent-color: var(--magenta); width: 120px;">
                <i class="fas fa-volume-up" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </div>
        </div>

        <div class="action-btns">
            <a href="https://play.google.com/store/apps/details?id=radio.milenium3" target="_blank" class="btn btn-store"><i class="fab fa-google-play"></i> DESCARGAR APP EN PLAY STORE</a>
            <a href="https://wa.me/5492634310614" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> ENVIAR WHATSAPP</a>
            <a href="tel:02634420773" class="btn btn-phone"><i class="fas fa-phone-alt"></i> LLAMAR AL FIJO (ESTUDIO)</a>
        </div>
    </div>

    <footer>
        &copy; 2026 FM Milenium 102.3 | San Martín, Mendoza, Argentina.
    </footer>

    <audio id="stream" src="http://s2.free-shoutcast.com:18208/;stream"></audio>

    <script>
        // Enlace de tu Google Sheets en formato CSV
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuFgP5EhuP-TwX7XDpXJXSrk4oxmOc0IS9a1Yx5ypO2nN2_UOrEfN3jiHCJoW03wbHYCbblUELLcUx/pub?output=csv";

        let listaProgramas = [];

        // RELOJ CON HUSO HORARIO FIJO DE ARGENTINA
        function updateArgentinaTime() {
            const now = new Date();
            
            const optionsTime = { timeZone: 'America/Argentina/Buenos_Aires', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const optionsDate = { timeZone: 'America/Argentina/Buenos_Aires', weekday: 'long', day: 'numeric', month: 'long' };
            
            const argTimeStr = now.toLocaleTimeString('es-AR', optionsTime);
            const argDateStr = now.toLocaleDateString('es-AR', optionsDate);

            document.getElementById('digital-clock').innerText = argTimeStr;
            document.getElementById('current-date').innerText = argDateStr;

            const [hora, minutos] = argTimeStr.split(':').map(Number);
            const argDateObj = new Date(now.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
            const diaSemanaArg = argDateObj.getDay(); 

            if(listaProgramas.length > 0) {
                checkLiveSchedule(hora, minutos, diaSemanaArg);
            }
        }

        // CONECTAR Y LEER LOS DATOS DEL EXCEL
        async function loadExcelData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const filas = data.split("\n").slice(1).filter(f => f.trim() !== ""); 
                
                listaProgramas = filas.map(fila => {
                    const columnas = fila.split(",");
                    if(columnas.length < 5) return null;
                    return {
                        nombre: columnas[0]?.trim(),
                        conductor: columnas[1]?.trim(),
                        inicio: columnas[2]?.trim(), 
                        fin: columnas[3]?.trim(),    
                        dias: columnas[4]?.trim().split("-").map(Number), 
                        foto: columnas[5]?.trim() || "logo.png"
                    };
                }).filter(p => p !== null);
                
                setInterval(updateArgentinaTime, 1000);
                updateArgentinaTime();
            } catch (error) {
                console.error("Error al conectar con Google Sheets:", error);
                document.getElementById('prog-name').innerText = "FM Milenium 102.3";
                document.getElementById('prog-host').innerText = "Música en Vivo";
            }
        }

        // COMPROBACIÓN DE HORARIO EN VIVO
        function checkLiveSchedule(hora, minutos, dia) {
            const horaActualStr = `${String(hora).padStart(2, '0')}:${String(minutos).padStart(2, '0')}`;

            const enVivo = listaProgramas.find(p => {
                const coincideDia = p.dias.includes(dia);
                const coincideHora = horaActualStr >= p.inicio && horaActualStr < p.fin;
                return coincideDia && coincideHora;
            });

            if (enVivo) {
                document.getElementById('prog-name').innerText = enVivo.nombre;
                document.getElementById('prog-host').innerText = "Conduce: " + enVivo.conductor;
                document.getElementById('prog-logo').src = enVivo.foto;
            } else {
                document.getElementById('prog-name').innerText = "Música Milenium";
                document.getElementById('prog-host').innerText = "Conexión Automática";
                document.getElementById('prog-logo').src = "logo.png"; 
            }
        }

        // CONTROLES DEL REPRODUCTOR
        const audio = document.getElementById('stream');
        const btn = document.getElementById('playBtn');
        
        btn.onclick = () => {
            if (audio.paused) { 
                audio.play(); 
                btn.innerHTML = '<i class="fas fa-pause"></i>'; 
            } else { 
                audio.pause(); 
                btn.innerHTML = '<i class="fas fa-play"></i>'; 
            }
        };
        
        document.getElementById('vol').oninput = (e) => {
            audio.volume = e.target.value;
        };

        loadExcelData();
    </script>
</body>
</html>
